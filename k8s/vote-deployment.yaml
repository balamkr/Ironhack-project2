apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - name: vote
        image: blamkr/vote:latest
        ports:
        - containerPort: 80
        env:
        # FIX: Prevents crash from K8s auto-injecting a URL into REDIS_PORT
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_HOST
          value: "redis"
