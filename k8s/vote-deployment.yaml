apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - name: vote
        image: blamkr/vote:latest
        ports:
        - containerPort: 80
        # FIX: Explicitly set Redis variables to avoid K8s auto-injection conflicts
        env:
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_HOST
          value: "redis"